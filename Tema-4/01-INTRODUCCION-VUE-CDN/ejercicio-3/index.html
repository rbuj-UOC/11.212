<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Listado de peliculas</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
    </head>
    <body class="bg-light">
        <main id="vueApp" class="container py-4 py-md-5">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                <div>
                    <h1 class="h2 mb-1">Listado de peliculas</h1>
                    <p class="text-secondary mb-0">
                        Mostrando {{ filteredMovies.length }} de {{ movies.length }} peliculas
                    </p>
                </div>

                <button class="btn btn-primary" @click="toggleInTheatersFilter">
                    {{ filterButtonText }}
                </button>
            </div>

            <div class="row g-4">
                <div class="col-12 col-md-6 col-xl-4" v-for="movie in filteredMovies" :key="movie.id">
                    <article class="card h-100 shadow-sm border-0">
                        <img
                            :src="movie.image"
                            :alt="movie.name"
                            class="card-img-top"
                            style="height: 420px; object-fit: cover"
                        />

                        <div class="card-body d-flex flex-column">
                            <h2 class="h5 card-title mb-1">{{ movie.name }}</h2>
                            <p class="text-secondary mb-2">{{ movie.year }}</p>

                            <p class="small mb-3">{{ movie.description }}</p>

                            <div class="d-flex flex-wrap gap-2 mb-3">
                                <span class="badge text-bg-secondary" v-for="genre in movie.genres" :key="genre">
                                    {{ genre }}
                                </span>
                            </div>

                            <div class="mt-auto d-flex justify-content-between align-items-center">
                                <span class="badge text-bg-warning">Rating: {{ movie.rating }}/5</span>
                                <span
                                    class="badge"
                                    :class="movie.inTheaters ? 'text-bg-success' : 'text-bg-dark'"
                                >
                                    {{ movie.inTheaters ? 'En cines' : 'No en cines' }}
                                </span>
                            </div>
                        </div>
                    </article>
                </div>
            </div>
        </main>

        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="app.js"></script>
    </body>
</html>
